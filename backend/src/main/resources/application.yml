server:
  port: 8080

spring:
  application:
    name: traffic-optimization

# CORS configuration - allow frontend access
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Logging configuration
logging:
  level:
    com.traffic.optimization: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Simulation parameter configuration
simulation:
  # Time step (seconds)
  time-step: 1
  # Road unit capacity (vehicles per kilometer)
  road-capacity-per-km: 100
  # Uniform speed limit (kilometers per hour)
  speed-limit: 60
  # Efficiency calculation interval (seconds)
  efficiency-calculation-interval: 3600
